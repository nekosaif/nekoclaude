<div class="bg-slate-800 rounded p-3 border border-slate-700">
  <div class="flex items-center justify-between mb-2">
    <h4 class="text-slate-200 text-xs font-semibold">
      {% if is_new %}New status line{% else %}Edit status line <code class="text-emerald-300">{{ slug }}</code>{% endif %}
    </h4>
    <button type="button" class="text-[10px] bg-slate-700 hover:bg-slate-600 px-2 py-0.5 rounded"
            onclick="document.getElementById('catalog-editor').innerHTML=''">Close</button>
  </div>

  <div id="editor-error" class="mb-2"></div>

  <form {% if is_new %}hx-post="/catalog/statuslines"{% else %}hx-put="/catalog/statuslines/{{ slug }}"{% endif %}
        hx-target="#catalog-panel"
        hx-swap="innerHTML">
    <div class="grid grid-cols-2 gap-2">
      {% if is_new %}
      <input name="slug" required pattern="[A-Za-z0-9_\-]+" placeholder="slug (folder name)"
             class="bg-slate-900 px-2 py-1 rounded border border-slate-700 focus:outline-none focus:border-slate-500">
      {% endif %}
      <input name="name" value="{{ sl.name }}" placeholder="display name"
             class="bg-slate-900 px-2 py-1 rounded border border-slate-700 focus:outline-none focus:border-slate-500 {% if not is_new %}col-span-2{% endif %}">
      <textarea name="description" rows="2" placeholder="description"
                class="bg-slate-900 px-2 py-1 rounded border border-slate-700 focus:outline-none focus:border-slate-500 col-span-2">{{ sl.description }}</textarea>
    </div>
    <label class="block text-[10px] text-slate-400 mt-2">statusline.sh body</label>
    <textarea name="script" rows="18"
              class="w-full bg-slate-900 text-xs text-slate-200 p-2 rounded border border-slate-700 focus:outline-none focus:border-slate-500 font-mono">{{ sl.script }}</textarea>
    <p class="text-[10px] text-slate-500 mt-1">The script is invoked by Claude with JSON on stdin and must emit a single line on stdout.</p>
    <button class="mt-2 text-[10px] bg-emerald-700 hover:bg-emerald-600 px-3 py-1 rounded">Save</button>
  </form>
</div>

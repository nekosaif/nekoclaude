<ul class="space-y-1">
  {% for t in targets %}
  <li class="flex items-center gap-2">
    <label class="flex items-center gap-2 flex-1 cursor-pointer text-xs">
      <input type="checkbox"
             :checked="isSelected('{{ t.id }}')"
             @change="toggleTarget('{{ t.id }}')"
             class="accent-emerald-500">
      <span class="flex-1">
        <span class="block text-slate-200">{{ t.label }}</span>
        <span class="block text-[10px] text-slate-500">{{ t.claude_dir }}</span>
      </span>
    </label>
    {% if t.kind == "project" %}
    <button hx-post="/targets/remove/{{ t.id }}"
            hx-target="#target-list"
            hx-swap="innerHTML"
            class="text-xs text-slate-500 hover:text-rose-400"
            title="stop tracking">×</button>
    {% endif %}
  </li>
  {% endfor %}
</ul>

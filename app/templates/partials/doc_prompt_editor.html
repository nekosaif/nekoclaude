<div class="bg-slate-800 rounded p-2 border border-slate-700">
  <div id="editor-error" class="mb-2"></div>

  <form {% if is_new %}
        hx-post="/catalog/doc-prompts"
        {% else %}
        hx-put="/catalog/doc-prompts/{{ kind }}"
        {% endif %}
        hx-target="#doc-prompts-manage"
        hx-swap="innerHTML">

    <div class="flex items-center gap-2 mb-2">
      {% if is_new %}
      <input type="text" name="kind" required pattern="[A-Za-z0-9_\-]+"
             placeholder="KIND (e.g. ROADMAP)"
             class="flex-1 bg-slate-900 text-xs px-2 py-1 rounded border border-slate-700 focus:outline-none focus:border-slate-500">
      {% else %}
      <span class="text-slate-200 text-xs">Editing <code>{{ kind }}.prompt.md</code></span>
      {% endif %}
      <button type="submit" class="text-[10px] bg-emerald-700 hover:bg-emerald-600 px-2 py-0.5 rounded">
        Save
      </button>
      <button type="button" class="text-[10px] bg-slate-700 hover:bg-slate-600 px-2 py-0.5 rounded"
              onclick="document.getElementById('doc-prompt-editor').innerHTML=''">
        Cancel
      </button>
    </div>

    <textarea name="body" rows="14"
              class="w-full bg-slate-900 text-xs text-slate-200 p-2 rounded border border-slate-700 focus:outline-none focus:border-slate-500 font-mono">{{ body }}</textarea>
  </form>
</div>

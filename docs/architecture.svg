<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 880" width="1000" height="880" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace">
<rect width="100%" height="100%" fill="#020617"/>

        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <marker id="arrowhead-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
          </marker>
          <marker id="arrowhead-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- ===== Arrows first (so they render behind boxes) ===== -->

        <!-- Browser -> Routers (single bundled arrow) -->
        <line x1="500" y1="120" x2="500" y2="158" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead-cyan)"/>
        <text x="510" y="142" fill="#94a3b8" font-size="9">HTML partials / HTMX</text>

        <!-- Routers -> Services (bundled arrows from router row to service row) -->
        <line x1="500" y1="245" x2="500" y2="278" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>

        <!-- Services -> Storage (catalog/logs/state) -->
        <line x1="170" y1="475" x2="170" y2="510" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead-violet)"/>
        <text x="180" y="497" fill="#94a3b8" font-size="8">catalog_fs</text>
        <line x1="500" y1="475" x2="500" y2="510" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead-violet)"/>
        <text x="510" y="497" fill="#94a3b8" font-size="8">apply + changelog</text>
        <line x1="830" y1="475" x2="830" y2="510" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead-violet)"/>
        <text x="840" y="497" fill="#94a3b8" font-size="8">targets_store + skill_links</text>

        <!-- Services -> Targets (claude_fs writes directly to the .claude dirs) -->
        <path d="M 100 475 Q 100 660 250 685" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
        <text x="65" y="600" fill="#fb7185" font-size="8">claude_fs</text>
        <path d="M 200 475 Q 250 660 580 685" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>

        <!-- Snapshot path: apply writes to logs/snapshots/ before any target write -->
        <line x1="500" y1="640" x2="500" y2="670" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
        <text x="510" y="660" fill="#fbbf24" font-size="8">snapshot first</text>

        <!-- ===== Components (drawn after arrows so they paint on top) ===== -->

        <!-- Browser (Frontend, cyan) -->
        <rect x="350" y="50" width="300" height="70" rx="6" fill="#0f172a"/>
        <rect x="350" y="50" width="300" height="70" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="500" y="78" fill="white" font-size="13" font-weight="600" text-anchor="middle">Browser</text>
        <text x="500" y="96" fill="#94a3b8" font-size="10" text-anchor="middle">HTMX 1.9 · Alpine 3 · Tailwind</text>
        <text x="500" y="112" fill="#22d3ee" font-size="8" text-anchor="middle">no build step · CDN-loaded</text>

        <!-- FastAPI shell boundary -->
        <rect x="20" y="155" width="960" height="320" rx="12" fill="rgba(6, 78, 59, 0.05)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="34" y="173" fill="#34d399" font-size="10" font-weight="600">FastAPI app · 127.0.0.1:8000 (or tailnet IP)</text>

        <!-- Routers row (Backend, emerald) — 7 boxes -->
        <!-- Compute: 7 boxes, w=120, gap=12. Total = 7*120 + 6*12 = 912. Start x = (1000-912)/2 = 44 -->
        <rect x="44"  y="185" width="120" height="60" rx="6" fill="#0f172a"/>
        <rect x="44"  y="185" width="120" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="104" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle">targets</text>
        <text x="104" y="224" fill="#94a3b8" font-size="8" text-anchor="middle">/targets</text>
        <text x="104" y="236" fill="#94a3b8" font-size="8" text-anchor="middle">/targets/discover</text>

        <rect x="176" y="185" width="120" height="60" rx="6" fill="#0f172a"/>
        <rect x="176" y="185" width="120" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="236" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle">installed</text>
        <text x="236" y="224" fill="#94a3b8" font-size="8" text-anchor="middle">/installed/{id}</text>

        <rect x="308" y="185" width="120" height="60" rx="6" fill="#0f172a"/>
        <rect x="308" y="185" width="120" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="368" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle">catalog</text>
        <text x="368" y="224" fill="#94a3b8" font-size="8" text-anchor="middle">/catalog/*</text>
        <text x="368" y="236" fill="#94a3b8" font-size="8" text-anchor="middle">CRUD + templates</text>

        <rect x="440" y="185" width="120" height="60" rx="6" fill="#0f172a"/>
        <rect x="440" y="185" width="120" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="500" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle">stage</text>
        <text x="500" y="224" fill="#94a3b8" font-size="8" text-anchor="middle">/stage/* + diff</text>

        <rect x="572" y="185" width="120" height="60" rx="6" fill="#0f172a"/>
        <rect x="572" y="185" width="120" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="632" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle">apply</text>
        <text x="632" y="224" fill="#94a3b8" font-size="8" text-anchor="middle">POST /apply</text>

        <rect x="704" y="185" width="120" height="60" rx="6" fill="#0f172a"/>
        <rect x="704" y="185" width="120" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="764" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle">revert</text>
        <text x="764" y="224" fill="#94a3b8" font-size="8" text-anchor="middle">/history/{id}/*</text>

        <rect x="836" y="185" width="120" height="60" rx="6" fill="#0f172a"/>
        <rect x="836" y="185" width="120" height="60" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="896" y="208" fill="white" font-size="11" font-weight="600" text-anchor="middle">settings</text>
        <text x="896" y="224" fill="#94a3b8" font-size="8" text-anchor="middle">/settings/{id}</text>

        <text x="500" y="270" fill="#34d399" font-size="9" font-weight="600" text-anchor="middle" font-style="italic">routers thin — never touch fs directly</text>

        <!-- Services row — 4 groups, each multi-line -->
        <!-- y = 285, h = 180 (multi-line) -->

        <!-- Group 1: filesystem boundary -->
        <rect x="40" y="285" width="200" height="180" rx="8" fill="#0f172a"/>
        <rect x="40" y="285" width="200" height="180" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="140" y="307" fill="white" font-size="12" font-weight="600" text-anchor="middle">filesystem layer</text>
        <text x="140" y="323" fill="#34d399" font-size="8" text-anchor="middle">only place that touches .claude/</text>
        <text x="140" y="350" fill="#94a3b8" font-size="10" text-anchor="middle">• claude_fs.py</text>
        <text x="140" y="368" fill="#94a3b8" font-size="8" text-anchor="middle">read/write target skills,</text>
        <text x="140" y="380" fill="#94a3b8" font-size="8" text-anchor="middle">settings, statusline</text>
        <text x="140" y="408" fill="#94a3b8" font-size="10" text-anchor="middle">• catalog_fs.py</text>
        <text x="140" y="426" fill="#94a3b8" font-size="8" text-anchor="middle">read/write catalog,</text>
        <text x="140" y="438" fill="#94a3b8" font-size="8" text-anchor="middle">git clone / pull</text>
        <text x="140" y="456" fill="#34d399" font-size="8" font-weight="600" text-anchor="middle">app/services/</text>

        <!-- Group 2: mutation pipeline -->
        <rect x="260" y="285" width="200" height="180" rx="8" fill="#0f172a"/>
        <rect x="260" y="285" width="200" height="180" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="360" y="307" fill="white" font-size="12" font-weight="600" text-anchor="middle">mutation pipeline</text>
        <text x="360" y="323" fill="#34d399" font-size="8" text-anchor="middle">snapshot → write → log</text>
        <text x="360" y="350" fill="#94a3b8" font-size="10" text-anchor="middle">• apply.py</text>
        <text x="360" y="368" fill="#94a3b8" font-size="8" text-anchor="middle">orchestrate ops per target</text>
        <text x="360" y="396" fill="#94a3b8" font-size="10" text-anchor="middle">• snapshot.py</text>
        <text x="360" y="414" fill="#94a3b8" font-size="8" text-anchor="middle">selective copy + restore</text>
        <text x="360" y="442" fill="#94a3b8" font-size="10" text-anchor="middle">• changelog.py</text>
        <text x="360" y="458" fill="#94a3b8" font-size="8" text-anchor="middle">append-only JSONL</text>

        <!-- Group 3: cart + preview -->
        <rect x="480" y="285" width="200" height="180" rx="8" fill="#0f172a"/>
        <rect x="480" y="285" width="200" height="180" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="580" y="307" fill="white" font-size="12" font-weight="600" text-anchor="middle">staging &amp; preview</text>
        <text x="580" y="323" fill="#34d399" font-size="8" text-anchor="middle">in-memory, per session</text>
        <text x="580" y="350" fill="#94a3b8" font-size="10" text-anchor="middle">• stage.py</text>
        <text x="580" y="368" fill="#94a3b8" font-size="8" text-anchor="middle">cart keyed by cookie</text>
        <text x="580" y="380" fill="#94a3b8" font-size="8" text-anchor="middle">op kinds: install/remove/</text>
        <text x="580" y="392" fill="#94a3b8" font-size="8" text-anchor="middle">patch/scaffold</text>
        <text x="580" y="420" fill="#94a3b8" font-size="10" text-anchor="middle">• preview.py</text>
        <text x="580" y="438" fill="#94a3b8" font-size="8" text-anchor="middle">side-by-side aligned diff</text>
        <text x="580" y="450" fill="#94a3b8" font-size="8" text-anchor="middle">(difflib SequenceMatcher)</text>

        <!-- Group 4: registries + library -->
        <rect x="700" y="285" width="260" height="180" rx="8" fill="#0f172a"/>
        <rect x="700" y="285" width="260" height="180" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="830" y="307" fill="white" font-size="12" font-weight="600" text-anchor="middle">registries &amp; library</text>
        <text x="830" y="323" fill="#34d399" font-size="8" text-anchor="middle">persistent state + bundled seeds</text>
        <text x="830" y="350" fill="#94a3b8" font-size="10" text-anchor="middle">• targets_store.py</text>
        <text x="830" y="365" fill="#94a3b8" font-size="8" text-anchor="middle">tracked project .claude/ paths</text>
        <text x="830" y="388" fill="#94a3b8" font-size="10" text-anchor="middle">• skill_links.py</text>
        <text x="830" y="403" fill="#94a3b8" font-size="8" text-anchor="middle">bookmarked git URLs registry</text>
        <text x="830" y="426" fill="#94a3b8" font-size="10" text-anchor="middle">• templates_lib.py</text>
        <text x="830" y="441" fill="#94a3b8" font-size="8" text-anchor="middle">18 starter presets + doc prompts</text>
        <text x="830" y="458" fill="#94a3b8" font-size="8" text-anchor="middle">+ handoff_prompt.py</text>

        <!-- Storage row (Database, violet) -->
        <rect x="60"  y="510" width="220" height="100" rx="6" fill="#0f172a"/>
        <rect x="60"  y="510" width="220" height="100" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="170" y="534" fill="white" font-size="12" font-weight="600" text-anchor="middle">catalog/</text>
        <text x="170" y="554" fill="#94a3b8" font-size="9" text-anchor="middle">• skills/&lt;slug&gt;/</text>
        <text x="170" y="568" fill="#94a3b8" font-size="9" text-anchor="middle">• statuslines/&lt;slug&gt;/</text>
        <text x="170" y="582" fill="#94a3b8" font-size="9" text-anchor="middle">• settings-presets/&lt;slug&gt;/</text>
        <text x="170" y="596" fill="#94a3b8" font-size="9" text-anchor="middle">• doc-prompts/*.prompt.md</text>

        <rect x="390" y="510" width="220" height="100" rx="6" fill="#0f172a"/>
        <rect x="390" y="510" width="220" height="100" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="500" y="534" fill="white" font-size="12" font-weight="600" text-anchor="middle">logs/</text>
        <text x="500" y="554" fill="#94a3b8" font-size="9" text-anchor="middle">&lt;target-slug&gt;/</text>
        <text x="500" y="572" fill="#94a3b8" font-size="9" text-anchor="middle">• history.jsonl</text>
        <text x="500" y="586" fill="#94a3b8" font-size="9" text-anchor="middle">• snapshots/&lt;change-id&gt;/</text>
        <text x="500" y="603" fill="#a78bfa" font-size="8" text-anchor="middle">enables per-change revert</text>

        <rect x="720" y="510" width="220" height="100" rx="6" fill="#0f172a"/>
        <rect x="720" y="510" width="220" height="100" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="830" y="534" fill="white" font-size="12" font-weight="600" text-anchor="middle">state/</text>
        <text x="830" y="554" fill="#94a3b8" font-size="9" text-anchor="middle">• targets.json</text>
        <text x="830" y="572" fill="#94a3b8" font-size="9" text-anchor="middle">• skill_links.json</text>
        <text x="830" y="596" fill="#a78bfa" font-size="8" text-anchor="middle">portable across machines via git</text>

        <!-- Targets row (External/Generic, slate) inside security boundary -->
        <rect x="40" y="660" width="920" height="160" rx="10" fill="transparent" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/>
        <text x="56" y="678" fill="#fb7185" font-size="9">user filesystem — trust zone</text>

        <rect x="100" y="685" width="380" height="120" rx="6" fill="#0f172a"/>
        <rect x="100" y="685" width="380" height="120" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="290" y="708" fill="white" font-size="12" font-weight="600" text-anchor="middle">~/.claude/ (global)</text>
        <text x="290" y="728" fill="#94a3b8" font-size="9" text-anchor="middle">• skills/ (user + plugin-sourced)</text>
        <text x="290" y="742" fill="#94a3b8" font-size="9" text-anchor="middle">• settings.json</text>
        <text x="290" y="756" fill="#94a3b8" font-size="9" text-anchor="middle">• statusline.sh</text>
        <text x="290" y="770" fill="#94a3b8" font-size="9" text-anchor="middle">• plugins/installed_plugins.json (read-only)</text>
        <text x="290" y="794" fill="#94a3b8" font-size="8" text-anchor="middle">target id: global</text>

        <rect x="520" y="685" width="380" height="120" rx="6" fill="#0f172a"/>
        <rect x="520" y="685" width="380" height="120" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="710" y="708" fill="white" font-size="12" font-weight="600" text-anchor="middle">&lt;project&gt;/.claude/ (project)</text>
        <text x="710" y="728" fill="#94a3b8" font-size="9" text-anchor="middle">• skills/ (project-scoped)</text>
        <text x="710" y="742" fill="#94a3b8" font-size="9" text-anchor="middle">• settings.local.json (permissions)</text>
        <text x="710" y="756" fill="#94a3b8" font-size="9" text-anchor="middle">• .nekoclaude-handoff-prompt.md</text>
        <text x="710" y="770" fill="#94a3b8" font-size="9" text-anchor="middle">  (when doc-scaffold staged)</text>
        <text x="710" y="794" fill="#94a3b8" font-size="8" text-anchor="middle">target id: home_saif_&lt;project&gt;</text>

        <!-- Legend (placed below all boundaries; tracker rect ends at y=820, legend at y=842) -->
        <text x="40" y="852" fill="white" font-size="10" font-weight="600">Legend</text>
        <rect x="100" y="844" width="16" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
        <text x="122" y="852" fill="#94a3b8" font-size="8">Frontend</text>
        <rect x="190" y="844" width="16" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
        <text x="212" y="852" fill="#94a3b8" font-size="8">Backend (routers + services)</text>
        <rect x="380" y="844" width="16" height="10" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
        <text x="402" y="852" fill="#94a3b8" font-size="8">Storage (repo files)</text>
        <rect x="530" y="844" width="16" height="10" rx="2" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1"/>
        <text x="552" y="852" fill="#94a3b8" font-size="8">External target (.claude/)</text>
        <rect x="710" y="844" width="16" height="10" rx="2" fill="transparent" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="732" y="852" fill="#94a3b8" font-size="8">Trust boundary</text>
        <line x1="830" y1="849" x2="858" y2="849" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="864" y="852" fill="#94a3b8" font-size="8">Snapshot path</text>
      
</svg>
